version: "3.8"

services:
  cabinet-frontend:
    image: ghcr.io/BEDOLAGA-DEV/bedolaga-cabinet:latest
    container_name: cabinet_frontend
    restart: unless-stopped

    env_file:
      - .env

    environment:
      # Кабинет ходит в Web API бота по его docker-имени и порту 8080
      CABINET_API_URL: "http://remnawave_bot:8080"
      # если в доке/репо другое имя переменной (например CABINET_BACKEND_URL) — подправь под фактическое [web:17]
      VITE_API_URL: "/api"

      VITE_TELEGRAM_BOT_USERNAME: "${VITE_TELEGRAM_BOT_USERNAME}"
      VITE_APP_NAME: "${VITE_APP_NAME:-Cabinet}"
      VITE_APP_LOGO: "${VITE_APP_LOGO:-V}"

    ports:
      - "${CABINET_PORT:-3020}:80"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - remnawave-network     # та же сеть, где уже есть remnawave_bot

networks:
  remnawave-network:
    external: true
